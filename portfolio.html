<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Theo Bui</title>
    <meta name="description" content="Design engineering portfolio — Theo Bui">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #1a0a2e;
            -webkit-font-smoothing: antialiased;
        }
        header {
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            background: #1a0a2e;
            z-index: 10;
        }
        header a {
            color: #555;
            text-decoration: none;
            font-size: 0.82em;
            transition: color 0.2s;
        }
        header a:hover { color: #e8e8e8; }
        header span { color: #2e2e2e; font-size: 0.82em; }
        header .title { color: #888; font-size: 0.82em; }
        .pages {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 16px 80px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pages img {
            width: 100%;
            display: block;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">← Theo Bui</a>
        <span>/</span>
        <span class="title">Portfolio</span>
    </header>
    <div class="pages">
        <img src="/portfolio-images/page-01.jpg" alt="Portfolio page 1" loading="lazy">
        <img src="/portfolio-images/page-02.jpg" alt="Portfolio page 2" loading="lazy">
        <img src="/portfolio-images/page-03.jpg" alt="Portfolio page 3" loading="lazy">
        <img src="/portfolio-images/page-04.jpg" alt="Portfolio page 4" loading="lazy">
        <img src="/portfolio-images/page-05.jpg" alt="Portfolio page 5" loading="lazy">
        <img src="/portfolio-images/page-06.jpg" alt="Portfolio page 6" loading="lazy">
        <img src="/portfolio-images/page-07.jpg" alt="Portfolio page 7" loading="lazy">
        <img src="/portfolio-images/page-08.jpg" alt="Portfolio page 8" loading="lazy">
        <img src="/portfolio-images/page-09.jpg" alt="Portfolio page 9" loading="lazy">
        <img src="/portfolio-images/page-10.jpg" alt="Portfolio page 10" loading="lazy">
        <img src="/portfolio-images/page-11.jpg" alt="Portfolio page 11" loading="lazy">
        <img src="/portfolio-images/page-12.jpg" alt="Portfolio page 12" loading="lazy">
        <img src="/portfolio-images/page-13.jpg" alt="Portfolio page 13" loading="lazy">
        <img src="/portfolio-images/page-14.jpg" alt="Portfolio page 14" loading="lazy">
        <img src="/portfolio-images/page-15.jpg" alt="Portfolio page 15" loading="lazy">
    </div>
</body>
</html>
