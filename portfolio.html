<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Theo Bui</title>
    <meta name="description" content="Design engineering portfolio — Theo Bui">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0c0c0c;
            color: #b8b8b8;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        header a {
            color: #555;
            text-decoration: none;
            font-size: 0.82em;
            transition: color 0.2s;
        }
        header a:hover { color: #e8e8e8; }
        header span { color: #2e2e2e; font-size: 0.82em; }
        header .title { color: #888; font-size: 0.82em; }
        .pdf-container {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        iframe {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 61px);
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">← Theo Bui</a>
        <span>/</span>
        <span class="title">Portfolio</span>
    </header>
    <div class="pdf-container">
        <iframe src="/portfolio.pdf#view=FitH" title="Theo Bui Portfolio"></iframe>
    </div>
</body>
</html>
